<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 512px; height: 512px; overflow: hidden; background: transparent; }
  .icon {
    width: 512px;
    height: 512px;
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-radius: 112px;
  }
  /* Outer ring */
  .ring {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 18px solid #10b981;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  /* Letter R */
  .letter {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    font-size: 160px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -4px;
    /* slight emerald tint on the stem */
    background: linear-gradient(160deg, #ffffff 55%, #10b981 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  /* Small accent dot at bottom of ring */
  .dot {
    position: absolute;
    bottom: -9px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 18px;
    background: #10b981;
    border-radius: 50%;
    border: 4px solid #0d1117;
  }
</style>
</head>
<body>
  <div class="icon">
    <div class="ring">
      <span class="letter">R</span>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
